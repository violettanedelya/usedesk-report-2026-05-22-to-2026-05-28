<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><title>Защищённый отчёт</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e2e8f0 100%);margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#1f2937}
.card{background:#fff;border-radius:16px;padding:40px 36px;box-shadow:0 10px 40px rgba(15,23,42,.08);width:100%;max-width:380px;text-align:center}
.lock{width:64px;height:64px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px}
h1{font-size:20px;margin:0 0 8px;color:#0f172a}
.sub{color:#64748b;font-size:13px;margin-bottom:24px}
input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;transition:border-color .15s;font-family:inherit}
input:focus{border-color:#3b82f6}
button{width:100%;margin-top:12px;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s;font-family:inherit}
button:hover{background:#2563eb}
.err{color:#dc2626;font-size:13px;margin-top:10px;min-height:18px}
</style></head>
<body>
<div class="card" id="lock">
  <div class="lock">🔒</div>
  <h1>Защищённый отчёт</h1>
  <div class="sub">Введите пароль для просмотра</div>
  <input id="pw" type="password" placeholder="Пароль" autofocus onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">Открыть</button>
  <div class="err" id="err"></div>
</div>

async function unlock(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');err.textContent='';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    document.open();document.write(new TextDecoder().decode(pt));document.close();
  }catch(e){err.textContent='Неверный пароль'}
}
