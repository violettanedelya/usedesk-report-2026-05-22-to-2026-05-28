function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function unlock(){const pwd=document.getElementById("pwd").value;const err=document.getElementById("err");err.textContent="";try{const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pwd),"PBKDF2",false,["deriveKey"]);const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT));const html=new TextDecoder().decode(pt);const newDoc=document.implementation.createHTMLDocument("");newDoc.documentElement.innerHTML=html.replace(/<!DOCTYPE[^>]*>/i,"").replace(/<\/?html[^>]*>/gi,"");document.documentElement.replaceWith(newDoc.documentElement);}catch(e){err.textContent="Неверный пароль"}}
document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});
</script></body></html>
